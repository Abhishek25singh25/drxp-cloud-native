version: "3.9"

services:
  backend:
    build:
      context: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/drxp
      - JWT_SECRET=drxp_secret_key_change_this_in_production
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  mongo-data: